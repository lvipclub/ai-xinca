  <circle cx="200" cy="175" r="8" fill="url(#nodeGlow)" opacity="0.8"/>
  <circle cx="350" cy="245" r="8" fill="url(#nodeGlow)" opacity="0.7"/>
  <circle cx="300" cy="385" r="8" fill="url(#nodeGlow)" opacity="0.6"/>
  <circle cx="200" cy="455" r="8" fill="url(#nodeGlow)" opacity="0.7"/>
  <circle cx="640" cy="325" r="8" fill="url(#nodeGlow)" opacity="0.6"/>
  <circle cx="640" cy="445" r="8" fill="url(#nodeGlow)" opacity="0.7"/>
  <circle cx="900" cy="215" r="8" fill="url(#nodeGlow)" opacity="0.7"/>
  <circle cx="950" cy="345" r="8" fill="url(#nodeGlow)" opacity="0.6"/>
