<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="60%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#0a1a2e"/>
    </linearGradient>
    <linearGradient id="energyFlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ea3f2" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2ea3f2" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7EBEC5" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nodeGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ea3f2"/>
      <stop offset="100%" stop-color="#7EBEC5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <!-- Building wireframe -->
  <rect x="100" y="80" width="400" height="470" rx="6" fill="none" stroke="#1e3a5f" stroke-width="2" opacity="0.7"/>
  <rect x="520" y="280" width="250" height="270" rx="6" fill="none" stroke="#1e3a5f" stroke-width="2" opacity="0.6"/>
  <rect x="790" y="180" width="310" height="370" rx="6" fill="none" stroke="#1e3a5f" stroke-width="2" opacity="0.7"/>
