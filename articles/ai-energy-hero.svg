  <line x1="102" y1="210" x2="498" y2="210" stroke="#1e3a5f" stroke-width="1" opacity="0.4"/>
  <line x1="102" y1="280" x2="498" y2="280" stroke="#1e3a5f" stroke-width="1" opacity="0.4"/>
  <line x1="102" y1="350" x2="498" y2="350" stroke="#1e3a5f" stroke-width="1" opacity="0.4"/>
  <line x1="102" y1="420" x2="498" y2="420" stroke="#1e3a5f" stroke-width="1" opacity="0.4"/>
  <line x1="522" y1="340" x2="768" y2="340" stroke="#1e3a5f" stroke-width="1" opacity="0.4"/>
  <line x1="522" y1="410" x2="768" y2="410" stroke="#1e3a5f" stroke-width="1" opacity="0.4"/>
  <line x1="792" y1="240" x2="1098" y2="240" stroke="#1e3a5f" stroke-width="1" opacity="0.4"/>
  <line x1="792" y1="310" x2="1098" y2="310" stroke="#1e3a5f" stroke-width="1" opacity="0.4"/>
  <line x1="792" y1="380" x2="1098" y2="380" stroke="#1e3a5f" stroke-width="1" opacity="0.4"/>
  <line x1="792" y1="450" x2="1098" y2="450" stroke="#1e3a5f" stroke-width="1" opacity="0.4"/>
