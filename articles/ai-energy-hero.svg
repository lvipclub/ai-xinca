  <path d="M200 175 Q350 150 350 245" fill="none" stroke="url(#energyFlow)" stroke-width="2" opacity="0.5"/>
  <path d="M350 245 Q300 300 300 385" fill="none" stroke="url(#energyFlow)" stroke-width="2" opacity="0.5"/>
  <path d="M300 385 Q200 400 200 455" fill="none" stroke="url(#energyFlow)" stroke-width="2" opacity="0.5"/>
  <path d="M640 325 Q640 380 640 445" fill="none" stroke="url(#energyFlow)" stroke-width="2" opacity="0.5"/>
  <path d="M900 215 Q950 280 950 345" fill="none" stroke="url(#energyFlow)" stroke-width="2" opacity="0.5"/>
  <path d="M950 345 Q900 420 900 485" fill="none" stroke="url(#energyFlow)" stroke-width="2" opacity="0.5"/>
  <!-- Data flow dots on paths -->
  <circle cx="250" cy="200" r="3" fill="#2ea3f2" opacity="0.9"/>
  <circle cx="325" cy="320" r="3" fill="#7EBEC5" opacity="0.9"/>
  <circle cx="240" cy="430" r="3" fill="#2ea3f2" opacity="0.7"/>
  <circle cx="640" cy="390" r="3" fill="#7EBEC5" opacity="0.8"/>
  <circle cx="925" cy="280" r="3" fill="#2ea3f2" opacity="0.9"/>
  <!-- Subtle grid -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1e3a5f" stroke-width="0.5" opacity="0.2"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1e3a5f" stroke-width="0.5" opacity="0.2"/>
